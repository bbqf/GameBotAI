name: .NET CI

permissions:
  contents: read

# pull_request is intentionally not a trigger: every branch is built on push
# (the speckit pipeline waits for that run before opening a PR), and GitHub
# surfaces the push run's checks on the PR for the same head commit. A
# pull_request trigger would rebuild the identical SHA a second time.
on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Restore
        run: dotnet restore GameBot.sln
      - name: Build
        run: dotnet build GameBot.sln --no-restore -c Release
      # Single full-suite run collects coverage for every gated area at once;
      # per-area thresholds are enforced afterwards by the script, so the test
      # suite never has to be re-executed per coverage gate.
      - name: Test (with coverage collection)
        run: dotnet test GameBot.sln --no-build --no-restore -c Release /p:CollectCoverage=true /p:CoverletOutputFormat=json /p:Include="[GameBot.Service]GameBot.Service.Endpoints.EmulatorImageEndpoints*%2c[GameBot.Domain]GameBot.Domain.Logging.FileExecutionLogRepository"
      - name: Coverage gates (installer endpoints, execution logs)
        shell: pwsh
        run: ./scripts/check-coverage-thresholds.ps1
      - name: Performance gate (execution logs ci profile)
        env:
          GAMEBOT_PERF_PROFILE: ci
        run: dotnet test tests/integration/GameBot.IntegrationTests.csproj --no-build --no-restore -c Release --filter "FullyQualifiedName~ExecutionLogsPerformanceIntegrationTests"

  web-ui-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'src/web-ui/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: src/web-ui
      - name: Run frontend tests
        run: npm test -- --coverage --silent
        working-directory: src/web-ui
